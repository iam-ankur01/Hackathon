services:
  - type: web
    name: hiresight-api
    runtime: docker
    # Dockerfile lives in backend/, but we set root to the repo so COPY
    # can see both backend/ and AI/ (ai_service.py imports from ../AI).
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
