services:
  - type: web
    name: hiresight-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: USE_LOCAL_DB
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
